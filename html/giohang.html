<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../js/jquery-3.7.1.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            height: auto;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        }
        table {
            background: white;
        }
        th, td {
            text-align: center;
        }
        .btn-danger:hover, .btn-success:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }
        .nav-menu{
            background-color: #e21818;
            height: 50px;
        }

        .nav-menu li:hover{
            background-color: black;
        }

        .dropdown-menu{
            background-color: #e21818;
        }

        .dropdown-item:hover{
            color: white;
            background-color: rgb(31, 30, 31);
        }

        .cart-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cart-icon.ring {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        .flying-img {
            position: absolute;
            width: 50px;
            height: 50px;
            z-index: 999;
            transition: transform 1s ease-in-out, opacity 1s;
        }

    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row" style="background-color: black; margin-bottom: 20px; margin-left: 3px; margin-right: 3px;">
            <ul class="nav nav-menu justify-content-center text-uppercase">
                <li class="nav-item">
                    <a class="nav-link text-light mt-1" href="home.html">Trang chủ</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-light mt-1" data-bs-toggle="dropdown" href="#">Sản phẩm</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item text-light" href="dodien.html">Thiết bị điện tử</a></li>
                        <li><a class="dropdown-item text-light" href="dodadung.html">Đồ gia dụng</a></li>
                        <li><a class="dropdown-item text-light" href="phukien.html">Phụ kiện</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link text-light mt-1" href="#thongtin">Thông tin</a></li>
                <li class="nav-item"><a class="nav-link text-light mt-1" href="#lienhe">Liên hệ</a></li>
                <li class="nav-item"><a class="nav-link text-light mt-1 me-5" href="#gioithieu">Giới thiệu</a></li>
            </ul>                
        </div>
        <h2 class="text-center text-primary">🛒 Giỏ Hàng</h2>
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="cart-items"></tbody>
        </table>
        <h4 class="text-end">Tổng tiền: <span id="total-price" class="text-danger">0</span></h4>
        <button class="btn btn-danger w-100" onclick="clearCart()">🗑 Xóa giỏ hàng</button>
    </div>

    <div class="container mt-5">
        <h3 class="text-primary">📦 Thông tin đặt hàng</h3>
        <form id="checkout-form">
            <div class="mb-3">
                <label>Họ và tên:</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Địa chỉ:</label>
                <input type="text" id="address" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Email:</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Số điện thoại:</label>
                <input type="tel" id="phone" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">🛍 Đặt hàng</button>
        </form>
    </div>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let cartTable = document.getElementById("cart-items");
            let total = 0;
            cartTable.innerHTML = "";
            
            cart.forEach((item, index) => {
                let totalItem = item.price * item.quantity;
                total += totalItem;
                cartTable.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.price.toLocaleString("vi-VN")} VNĐ</td>
                        <td><input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${index}, this.value)" class="form-control"></td>
                        <td>${totalItem.toLocaleString("vi-VN")} VNĐ</td>
                        <td><button class="btn btn-danger" onclick="removeItem(${index})">❌</button></td>
                    </tr>`;
            });
            document.getElementById("total-price").innerText = total.toLocaleString("vi-VN") + " VNĐ";
        }

        function updateQuantity(index, quantity) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let newQuantity = Math.max(1, parseInt(quantity, 10));
            cart[index].quantity = newQuantity;
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function clearCart() {
            localStorage.removeItem("cart");
            loadCart();
        }

        document.getElementById("checkout-form").addEventListener("submit", function(e) {
            e.preventDefault();
            let name = document.getElementById("name").value.trim();
            let address = document.getElementById("address").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            
            if (cart.length === 0) {
                alert("Giỏ hàng trống!");
                return;
            }

            alert(`Cảm ơn ${name}, đơn hàng của bạn đã được xác nhận!`);
            document.getElementById("checkout-form").reset();
            clearCart();
        });

        loadCart();

        function addToCart() {
            let img = document.getElementById("productImage");
            let cart = document.getElementById("cartIcon");
            let flyingImg = img.cloneNode(true);
            document.body.appendChild(flyingImg);

            let rect = img.getBoundingClientRect();
            flyingImg.style.left = rect.left + "px";
            flyingImg.style.top = rect.top + "px";
            flyingImg.classList.add("flying-img");

            setTimeout(() => {
                flyingImg.style.transform = `translate(${cart.offsetLeft - rect.left}px, ${cart.offsetTop - rect.top}px) scale(0.1)`;
                flyingImg.style.opacity = "0";
            }, 50);

            setTimeout(() => {
                flyingImg.remove();
                cart.classList.add("ring");
                setTimeout(() => cart.classList.remove("ring"), 500);
            }, 1000);
        }
    </script>
</body>
</html>
